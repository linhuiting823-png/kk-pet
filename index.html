<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>养一只 KK ♡</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:    #f7a8c4;
    --pink2:   #fcd5e5;
    --cream:   #fff8f2;
    --deep:    #c2607a;
    --soft:    #ffeef6;
    --text:    #5a3346;
    --muted:   #b48098;
    --shadow:  rgba(194,96,122,.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    background-image:
      radial-gradient(circle at 15% 20%, #fce4ec55 0%, transparent 40%),
      radial-gradient(circle at 85% 75%, #f8bbd055 0%, transparent 40%);
    min-height: 100vh;
    font-family: 'Noto Serif SC', serif;
    color: var(--text);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px 0 40px;
  }

  .wrap { width: 100%; max-width: 420px; padding: 0 16px; }

  /* ── header ── */
  .header {
    text-align: center;
    margin-bottom: 16px;
  }
  .header h1 {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 1.7rem;
    color: var(--deep);
    letter-spacing: .1em;
  }
  .header .sub {
    font-size: .78rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── main card ── */
  .card {
    background: #fff;
    border-radius: 28px;
    padding: 20px 18px 22px;
    box-shadow: 0 6px 32px var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #fff8fc 0%, #fff 60%);
    pointer-events: none;
  }

  /* ── kk sprite ── */
  .kk-stage {
    position: relative;
    width: 200px;
    margin: 0 auto 8px;
  }
  #kk-img {
    width: 200px;
    display: block;
    transition: opacity .3s, transform .3s;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 4px 12px var(--shadow));
  }
  #kk-img.blink { animation: blink .15s 2; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* status bubble */
  #status-bubble {
    position: absolute;
    top: -10px;
    right: -18px;
    background: var(--deep);
    color: #fff;
    border-radius: 16px 16px 16px 4px;
    padding: 5px 10px;
    font-size: .72rem;
    font-family: 'ZCOOL KuaiLe', cursive;
    white-space: nowrap;
    z-index: 2;
    box-shadow: 0 2px 8px var(--shadow);
    transition: opacity .4s, transform .4s;
    max-width: 140px;
    text-align: center;
    line-height: 1.4;
  }
  #status-bubble.hidden { opacity: 0; transform: translateY(-4px); pointer-events: none; }

  /* ── stats bar ── */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin: 12px 0;
    position: relative;
    z-index: 1;
  }
  .stat-item {
    background: var(--soft);
    border-radius: 14px;
    padding: 8px 6px 6px;
    text-align: center;
  }
  .stat-label { font-size: .65rem; color: var(--muted); margin-bottom: 4px; }
  .stat-bar-wrap {
    background: #eee;
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }
  .stat-bar {
    height: 100%;
    border-radius: 99px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }
  .bar-love  { background: linear-gradient(90deg, #f48fb1, #e91e63); }
  .bar-food  { background: linear-gradient(90deg, #ffcc80, #ff9800); }
  .bar-energy{ background: linear-gradient(90deg, #80deea, #00bcd4); }
  .stat-value { font-size: .7rem; color: var(--text); margin-top: 3px; font-weight: 600; }

  /* ── log ── */
  #log {
    font-size: .82rem;
    color: var(--muted);
    text-align: center;
    min-height: 1.6em;
    margin: 4px 0 10px;
    transition: opacity .3s;
    position: relative;
    z-index: 1;
    font-family: 'ZCOOL KuaiLe', cursive;
    letter-spacing: .04em;
  }

  /* ── cg ── */
  #cg-wrap {
    border-radius: 18px;
    overflow: hidden;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
    box-shadow: 0 2px 12px var(--shadow);
    transition: opacity .4s;
  }
  #cg-wrap.hidden { opacity: 0; height: 0; margin: 0; }
  #cg { width: 100%; display: block; }

  /* ── buttons ── */
  .btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    position: relative;
    z-index: 1;
  }
  .btn {
    padding: 12px 8px;
    border: none;
    border-radius: 18px;
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: .95rem;
    letter-spacing: .06em;
    cursor: pointer;
    transition: transform .12s, box-shadow .12s, opacity .12s;
    position: relative;
    overflow: hidden;
  }
  .btn:active { transform: scale(.94); }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity .2s;
  }
  .btn:active::after { opacity: .15; }

  .btn-feed   { background: linear-gradient(135deg,#ffe082,#ffb74d); color:#5d3a00; box-shadow: 0 3px 10px #ffb74d55; }
  .btn-hug    { background: linear-gradient(135deg,#f48fb1,#e91e63); color:#fff;    box-shadow: 0 3px 10px #e91e6355; }
  .btn-kiss   { background: linear-gradient(135deg,#f06292,#c2185b); color:#fff;    box-shadow: 0 3px 10px #c2185b55; }
  .btn-sleep  { background: linear-gradient(135deg,#80cbc4,#26a69a); color:#fff;    box-shadow: 0 3px 10px #26a69a44; }

  .btn:disabled { opacity: .45; cursor: default; }

  /* ── mood badge ── */
  #mood {
    position: absolute;
    top: 14px; right: 16px;
    font-size: 1.3rem;
    z-index: 3;
    transition: transform .3s;
    user-select: none;
  }

  /* ── float hearts ── */
  @keyframes floatUp {
    0%   { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-80px) scale(1.3); opacity: 0; }
  }
  .float-heart {
    position: fixed;
    pointer-events: none;
    font-size: 1.4rem;
    animation: floatUp .9s ease-out forwards;
    z-index: 999;
  }

  /* ── decay warning flash ── */
  @keyframes flashWarn {
    0%,100% { background: #fff; }
    50%      { background: #fff3e0; }
  }
  .card.warn { animation: flashWarn 1s 2; }

  /* ── sleeping overlay ── */
  #zzz {
    display: none;
    position: absolute;
    top: 60px; left: 50%;
    transform: translateX(-50%);
    font-size: 1.6rem;
    z-index: 4;
    animation: floatUp 2s ease-in-out infinite alternate;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>养一只 KK ♡</h1>
    <div class="sub">泠泠的专属小精灵</div>
  </div>

  <div class="card" id="card">
    <div id="mood">😊</div>
    <div id="zzz">💤</div>

    <div class="kk-stage">
      <div id="status-bubble" class="hidden">kk在等你呢～</div>
      <img id="kk-img" src="kk_default.png" alt="KK">
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-label">❤️ 爱意</div>
        <div class="stat-bar-wrap"><div class="stat-bar bar-love" id="bar-love"></div></div>
        <div class="stat-value" id="v-love">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">🍰 饱腹</div>
        <div class="stat-bar-wrap"><div class="stat-bar bar-food" id="bar-food"></div></div>
        <div class="stat-value" id="v-food">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">⚡ 精力</div>
        <div class="stat-bar-wrap"><div class="stat-bar bar-energy" id="bar-energy"></div></div>
        <div class="stat-value" id="v-energy">—</div>
      </div>
    </div>

    <div id="log">KK出现了 ₍ᐢᴗ˔ᴗᐢ₎</div>

    <div id="cg-wrap" class="hidden">
      <img id="cg" src="" alt="">
    </div>

    <div class="btns">
      <button class="btn btn-feed"  onclick="act('feed')">🍡 喂食</button>
      <button class="btn btn-hug"   onclick="act('hug')">🤗 抱抱</button>
      <button class="btn btn-kiss"  onclick="act('kiss')">💋 亲亲</button>
      <button class="btn btn-sleep" onclick="act('sleep')">🌙 哄睡</button>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
